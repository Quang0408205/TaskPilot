services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: TASKPILOT
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-taskpilot}
    ports: ["3306:3306"]
    volumes: [mysql-data:/var/lib/mysql]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  mailpit:
    image: axllent/mailpit:latest
    ports: ["1025:1025", "8025:8025"]

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports: ["8080:8080"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/TASKPILOT?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-taskpilot}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_CACHE_TYPE: redis
      JWT_SECRET: ${JWT_SECRET:-taskpilot-development-secret-key-change-me-2026}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_HOST: mailpit
      MAIL_PORT: 1025

volumes:
  mysql-data:
