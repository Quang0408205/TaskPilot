<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskPilot – Sign In</title>
  <link rel="stylesheet" th:href="@{/css/login.css}">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="page-wrapper">
    <div class="login-card">

      <!-- ── LEFT: Branding ── -->
      <div class="card-left">
        <div class="brand">
          <div class="brand-logo">
            <i class="fa-solid fa-square-check"></i>
          </div>
          <span class="brand-name">Task<span class="accent">Pilot</span></span>
        </div>

        <div class="headline">
          <h1>Organize tasks.<br /><span class="accent">Boost productivity.</span></h1>
          <p class="sub">TaskPilot helps you and your team stay organized, track progress, and get more done.</p>
        </div>

        <!-- SVG illustration -->
        <div class="illustration">
          <svg viewBox="0 0 420 320" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- Monitor -->
            <rect x="60" y="40" width="300" height="200" rx="14" fill="#e8ecff" />
            <rect x="72" y="52" width="276" height="176" rx="8" fill="#fff" />
            <!-- Screen content bars -->
            <rect x="88" y="68" width="120" height="10" rx="5" fill="#c7ceff" />
            <rect x="88" y="86" width="80" height="8" rx="4" fill="#e2e5ff" />
            <rect x="88" y="106" width="240" height="6" rx="3" fill="#eef0ff" />
            <rect x="88" y="118" width="200" height="6" rx="3" fill="#eef0ff" />
            <rect x="88" y="130" width="220" height="6" rx="3" fill="#eef0ff" />
            <!-- Task cards -->
            <rect x="88" y="148" width="70" height="64" rx="8" fill="#f3f4ff" stroke="#d6d9ff" stroke-width="1" />
            <rect x="96" y="156" width="40" height="5" rx="2.5" fill="#6b75f2" />
            <rect x="96" y="166" width="50" height="4" rx="2" fill="#c7ceff" />
            <rect x="96" y="175" width="45" height="4" rx="2" fill="#c7ceff" />
            <circle cx="104" cy="196" r="6" fill="#6b75f2" opacity=".25" />
            <circle cx="104" cy="196" r="3" fill="#6b75f2" />

            <rect x="168" y="148" width="70" height="64" rx="8" fill="#f3f4ff" stroke="#d6d9ff" stroke-width="1" />
            <rect x="176" y="156" width="40" height="5" rx="2.5" fill="#a78bfa" />
            <rect x="176" y="166" width="50" height="4" rx="2" fill="#c7ceff" />
            <rect x="176" y="175" width="35" height="4" rx="2" fill="#c7ceff" />
            <circle cx="184" cy="196" r="6" fill="#a78bfa" opacity=".25" />
            <circle cx="184" cy="196" r="3" fill="#a78bfa" />

            <rect x="248" y="148" width="70" height="64" rx="8" fill="#f3f4ff" stroke="#d6d9ff" stroke-width="1" />
            <rect x="256" y="156" width="40" height="5" rx="2.5" fill="#34d399" />
            <rect x="256" y="166" width="50" height="4" rx="2" fill="#c7ceff" />
            <rect x="256" y="175" width="45" height="4" rx="2" fill="#c7ceff" />
            <!-- checkmark -->
            <circle cx="264" cy="196" r="6" fill="#34d399" opacity=".25" />
            <polyline points="261,196 263,198.5 268,193" fill="none" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />

            <!-- Monitor stand -->
            <rect x="188" y="240" width="44" height="10" rx="4" fill="#d4d8ff" />
            <rect x="170" y="250" width="80" height="8" rx="4" fill="#bfc4f7" />

            <!-- Chart bars (top-right) -->
            <rect x="334" y="70" width="10" height="30" rx="3" fill="#6b75f2" opacity=".4" />
            <rect x="348" y="56" width="10" height="44" rx="3" fill="#6b75f2" opacity=".6" />
            <rect x="362" y="62" width="10" height="38" rx="3" fill="#6b75f2" />

            <!-- Calendar (bottom-left) -->
            <rect x="40" y="230" width="80" height="72" rx="10" fill="#fff" stroke="#d6d9ff" stroke-width="1.5" />
            <rect x="40" y="230" width="80" height="22" rx="10" fill="#6b75f2" />
            <rect x="40" y="242" width="80" height="10" rx="0" fill="#6b75f2" />
            <circle cx="60" cy="240" r="3" fill="#fff" opacity=".7" />
            <circle cx="80" cy="240" r="3" fill="#fff" opacity=".7" />
            <circle cx="100" cy="240" r="3" fill="#fff" opacity=".7" />
            <!-- calendar grid -->
            <rect x="50" y="262" width="8" height="6" rx="2" fill="#e2e5ff" />
            <rect x="62" y="262" width="8" height="6" rx="2" fill="#e2e5ff" />
            <rect x="74" y="262" width="8" height="6" rx="2" fill="#6b75f2" />
            <rect x="86" y="262" width="8" height="6" rx="2" fill="#e2e5ff" />
            <rect x="50" y="274" width="8" height="6" rx="2" fill="#e2e5ff" />
            <rect x="62" y="274" width="8" height="6" rx="2" fill="#e2e5ff" />
            <rect x="74" y="274" width="8" height="6" rx="2" fill="#e2e5ff" />
            <rect x="86" y="274" width="8" height="6" rx="2" fill="#e2e5ff" />

            <!-- Green check badge -->
            <circle cx="320" cy="250" r="24" fill="#34d399" />
            <polyline points="311,250 318,257 330,243" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

            <!-- Plant pot -->
            <ellipse cx="370" cy="290" rx="18" ry="8" fill="#3d5a80" />
            <rect x="355" y="270" width="30" height="22" rx="4" fill="#3d5a80" />
            <!-- leaves -->
            <path d="M370 270 Q355 250 345 240 Q360 242 370 258" fill="#22c55e" />
            <path d="M370 270 Q385 248 395 238 Q380 242 370 260" fill="#16a34a" />
            <path d="M370 268 Q362 252 358 242 Q368 248 372 265" fill="#22c55e" opacity=".8" />
          </svg>
        </div>
      </div>

      <!-- ── RIGHT: Login Form ── -->
      <div class="card-right">
        <h2>Welcome back</h2>
        <p class="form-sub">Sign in to your account to continue</p>

        <form id="loginForm" th:action="@{/api/auth/login}" method="post" novalidate>
          <div class="field-group">
            <label for="email">Email</label>
            <div class="input-wrap">
              <i class="fa-regular fa-envelope"></i>
              <input type="text" name="username" placeholder="Enter your email" autocomplete="email" />
            </div>
            <span class="field-error" id="emailError"></span>
          </div>

          <div class="field-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <i class="fa-solid fa-lock"></i>
              <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" />
              <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">
                <i class="fa-regular fa-eye" id="eyeIcon"></i>
              </button>
            </div>
            <span class="field-error" id="passwordError"></span>
          </div>

          <div class="row-options">
            <label class="checkbox-label">
              <input type="checkbox" id="remember" name="remember" />
              <span class="custom-check"></span>
              Remember me
            </label>
            <a href="#" class="link">Forgot password?</a>
          </div>

          <button type="submit" class="btn-primary" id="submitBtn">
            <span id="btnText">Sign in</span>
            <span id="btnLoader" class="hidden"><i class="fa-solid fa-spinner fa-spin"></i></span>
          </button>

          <div class="divider"><span>or continue with</span></div>

          <div class="social-row">
            <button type="button" class="btn-social">
              <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Google
            </button>
            <button type="button" class="btn-social">
              <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z" fill="#181717"/>
              </svg>
              GitHub
            </button>
          </div>
        </form>

        <p class="register-link">Don't have an account? <a href="#" class="link">Create account</a></p>
      </div>

    </div>
  </div>

  <script th:src="@{/js/login.js}"></script>
</body>
</html>
